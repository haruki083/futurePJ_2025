<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>医療機関マップ</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>

<style>
html, body {height:100%; margin:0;}
#app {display:grid; grid-template-columns:360px 1fr; height:100vh;}
#sidebar {padding:12px; border-right:1px solid #ddd; overflow:auto;}
#map {width:100%; height:100%;}
label{display:block; margin-top:8px; font-weight:600;}
input,textarea,select,button{width:100%; padding:8px; margin-top:4px; box-sizing:border-box;}
.controls{display:flex;gap:8px; flex-wrap:wrap; margin-top:8px;}
.place-item{padding:6px; border-bottom:1px solid #eee; cursor:pointer;}
.place-item:hover{background:#fafafa;}
.btn{cursor:pointer;}
</style>

<script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script defer src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <h2>医療機関マップ</h2>
    <p>地図をクリックして医療機関情報を追加できます。</p>

    <div class="controls">
      <button id="btn-refresh" class="btn">全表示</button>
    </div>

    <hr>
    <h3>保存済みの医療機関 (<span id="count">0</span>)</h3>
    <div id="places-list"></div>
  </div>
  <div id="map"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){
const mapCenter = [35.6804,139.7690]; // 東京駅
let map, markersLayer, data=[];

// ------------------- 初期化 -------------------
function initMap(){
  map = L.map('map').setView(mapCenter, 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19,
    attribution:'© OpenStreetMap contributors'
  }).addTo(map);

  markersLayer = L.markerClusterGroup();
  map.addLayer(markersLayer);
  map.on('click', onMapClick);

  loadData();
}

// ------------------- データ取得 -------------------
async function loadData(){
  try{
    const res = await fetch("/api/facilities");
    data = await res.json();
    renderAllMarkers();
    renderList();
  }catch(e){ console.error("読み込みエラー", e);}
}

// ------------------- マーカー追加 -------------------
function addMarkerFromData(place){
  const marker = L.marker([place.lat, place.lng]);
  const popupHtml = `
    <div style="min-width:220px">
      <strong>${escapeHtml(place.name)}</strong><br/>
      ${place.type?`診療科目: ${escapeHtml(place.type)}<br>`:''}
      ${place.address?`住所: ${escapeHtml(place.address)}<br>`:''}
      ${place.phone?`電話: ${escapeHtml(place.phone)}<br>`:''}
      <div style="margin-top:6px;display:flex;gap:6px">
        <button class="btn" onclick="editPlace('${place.id}')">編集</button>
        <button class="btn" onclick="deletePlace('${place.id}')">削除</button>
      </div>
    </div>`;
  marker.bindPopup(popupHtml);
  marker._placeId = place.id;
  markersLayer.addLayer(marker);
}

function renderAllMarkers(){
  markersLayer.clearLayers();
  data.forEach(addMarkerFromData);
}

function renderList(){
  const list = document.getElementById('places-list');
  list.innerHTML = '';
  data.forEach(p=>{
    const el = document.createElement('div');
    el.className='place-item';
    el.innerHTML = `<strong>${escapeHtml(p.name)}</strong><br/>
      ${p.type?escapeHtml(p.type)+' / ':''}${p.address?escapeHtml(p.address)+' / ':''}${p.phone?escapeHtml(p.phone):''}`;
    el.onclick = ()=>{ map.setView([p.lat,p.lng],18); const m=findMarkerById(p.id); if(m)m.openPopup(); };
    list.appendChild(el);
  });
  document.getElementById('count').textContent = data.length;
}

function findMarkerById(id){
  let found = null;
  markersLayer.eachLayer(l=>{ if(l._placeId==id) found=l; });
  return found;
}

// ------------------- 追加・編集ポップアップ -------------------
function openAddForm(lat,lng,prefillName='',prefillType='',prefillAddress='',prefillPhone='',prefillNote='', callback=null){
  const formHtml = `
    <div style="min-width:240px">
      <label>医療機関名</label><input id="f-name" value="${escapeHtml(prefillName)}"/>
      <label>診療科目</label><input id="f-type" value="${escapeHtml(prefillType)}"/>
      <label>住所</label><input id="f-address" value="${escapeHtml(prefillAddress)}"/>
      <label>電話番号</label><input id="f-phone" value="${escapeHtml(prefillPhone)}"/>
      <label>備考</label><textarea id="f-note" rows="3">${escapeHtml(prefillNote)}</textarea>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button id="f-save">保存</button>
        <button id="f-cancel">キャンセル</button>
      </div>
    </div>`;
  const popup = L.popup({maxWidth:400}).setLatLng([lat,lng]).setContent(formHtml).openOn(map);

  setTimeout(()=>{
    document.getElementById('f-save').onclick = async ()=>{
      const place = {
        id: callback ? undefined : Date.now().toString(),
        name: document.getElementById('f-name').value || '無題',
        type: document.getElementById('f-type').value || '',
        address: document.getElementById('f-address').value || '',
        phone: document.getElementById('f-phone').value || '',
        note: document.getElementById('f-note').value || '',
        lat: lat,
        lng: lng
      };
      if(callback){
        await callback(place); // 編集用
      }else{
        try{
          const res = await fetch("/api/facilities", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify(place)
          });
          const json = await res.json();
          place.id = json.id;
          data.push(place);
          addMarkerFromData(place);
          renderList();
          map.closePopup();
        }catch(e){ alert("保存エラー"); console.error(e);}
      }
    };
    document.getElementById('f-cancel').onclick = ()=>map.closePopup();
  },100);
}

function onMapClick(e){
  openAddForm(e.latlng.lat, e.latlng.lng);
}

// ------------------- 編集 -------------------
async function editPlace(id){
  const idx = data.findIndex(x=>x.id==id);
  if(idx<0) return alert("見つかりません");
  const p = data[idx];
  openAddForm(p.lat,p.lng,p.name,p.type,p.address,p.phone,p.note, async (updated)=>{
    try{
      updated.id = id;
      const res = await fetch(`/api/facilities/${id}`, {
        method:"PUT",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify(updated)
      });
      if(!res.ok) throw new Error("更新失敗");
      data[idx] = updated;
      renderAllMarkers();
      renderList();
      map.closePopup();
    }catch(e){ alert("編集保存エラー"); console.error(e);}
  });
}

// ------------------- 削除 -------------------
async function deletePlace(id){
  if(!confirm("削除しますか？")) return;
  try{
    await fetch(`/api/facilities/${id}`, {method:"DELETE"});
    data = data.filter(x=>x.id!=id);
    renderAllMarkers();
    renderList();
  }catch(e){alert("削除エラー"); console.error(e);}
}

// ------------------- ユーティリティ -------------------
function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"})[c]);}

// ------------------- UI -------------------
document.getElementById('btn-refresh').onclick = ()=>{ loadData(); };

// ------------------- グローバル公開 -------------------
window.editPlace = editPlace;
window.deletePlace = deletePlace;

// ------------------- 初期化 -------------------
initMap();
});
</script>
</body>
</html>
